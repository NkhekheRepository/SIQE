version: "3.8"

services:
  siqe_engine:
    build: .
    container_name: siqe_engine
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
